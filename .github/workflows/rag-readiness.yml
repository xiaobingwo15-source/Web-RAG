name: RAG Readiness Gate

on:
  workflow_dispatch:
  push:
    branches:
      - Staging
      - master

jobs:
  frontend-latency:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Fail fast on missing frontend secrets
        shell: bash
        run: |
          missing=()
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required frontend secret(s): %s\n' "${missing[*]}" >&2
            exit 2
          fi

      - name: Install Playwright Chromium and Linux dependencies
        run: npx playwright install --with-deps chromium

      - name: Run frontend latency checks
        run: npm run perf:e2e

  rag-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      WEB_RAG_BASE_URL: ${{ secrets.WEB_RAG_BASE_URL }}
      WEB_RAG_ADMIN_TOKEN: ${{ secrets.WEB_RAG_ADMIN_TOKEN }}
      WEB_RAG_CHAT_TOKEN: ${{ secrets.WEB_RAG_CHAT_TOKEN }}
      WEB_RAG_WIDGET_TENANT_SLUG: ${{ secrets.WEB_RAG_WIDGET_TENANT_SLUG }}
      WEB_RAG_WIDGET_ORIGIN: ${{ secrets.WEB_RAG_WIDGET_ORIGIN }}
      WEB_RAG_DOCUMENT_ID: ${{ secrets.WEB_RAG_DOCUMENT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fail fast on missing readiness secrets
        shell: bash
        run: |
          missing=()
          for name in WEB_RAG_BASE_URL WEB_RAG_ADMIN_TOKEN WEB_RAG_CHAT_TOKEN WEB_RAG_WIDGET_TENANT_SLUG WEB_RAG_WIDGET_ORIGIN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required readiness secret(s): %s\n' "${missing[*]}" >&2
            exit 2
          fi

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run RAG readiness gate
        run: python scripts/rag_readiness_check.py
