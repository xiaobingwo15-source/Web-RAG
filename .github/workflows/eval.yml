name: RAG Eval Pipeline

on:
  pull_request:
    branches: [master]
    paths:
      - "backend/app/**"
      - "backend/requirements.txt"
      - "backend/tests/fixtures/**"
      - "backend/scripts/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update baseline metrics after eval run"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Run RAG Eval Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval suite
        id: eval
        working-directory: backend
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          # Disable Langfuse tracing in CI
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.update_baseline }}" = "true" ]; then
            UPDATE_FLAG="--update-baseline"
          fi
          python -m scripts.run_eval_ci $UPDATE_FLAG
        continue-on-error: true

      - name: Read eval results
        id: results
        if: always()
        working-directory: backend
        run: |
          if [ -f tests/fixtures/eval_latest_results.json ]; then
            METRICS=$(python -c "
          import json
          with open('tests/fixtures/eval_latest_results.json') as f:
              data = json.load(f)
          m = data['metrics']
          print(f\"faithfulness={m['faithfulness']}\")
          print(f\"answer_relevance={m['answer_relevance']}\")
          print(f\"context_precision={m['context_precision']}\")
          print(f\"context_recall={m['context_recall']}\")
          print(f\"overall={m['overall']}\")
          print(f\"total_cases={data['total_cases']}\")
          ")
            echo "$METRICS" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const evalExitCode = '${{ steps.eval.outcome }}';
            const passed = evalExitCode === 'success';

            const faithfulness = '${{ steps.results.outputs.faithfulness }}' || 'N/A';
            const answerRelevance = '${{ steps.results.outputs.answer_relevance }}' || 'N/A';
            const contextPrecision = '${{ steps.results.outputs.context_precision }}' || 'N/A';
            const contextRecall = '${{ steps.results.outputs.context_recall }}' || 'N/A';
            const overall = '${{ steps.results.outputs.overall }}' || 'N/A';
            const totalCases = '${{ steps.results.outputs.total_cases }}' || 'N/A';

            const statusEmoji = passed ? 'passed' : 'FAILED';
            const statusLine = passed
              ? '> All metrics within acceptable range.'
              : '> **Regression detected.** One or more metrics dropped by more than 0.5 points.';

            const body = [
              `## RAG Eval CI — ${statusEmoji}`,
              '',
              '| Metric | Score |',
              '|--------|-------|',
              `| Faithfulness | ${faithfulness} |`,
              `| Answer Relevance | ${answerRelevance} |`,
              `| Context Precision | ${contextPrecision} |`,
              `| Context Recall | ${contextRecall} |`,
              `| **Overall** | **${overall}** |`,
              '',
              `- Test cases evaluated: **${totalCases}**`,
              `- Regression threshold: **0.5** (on 1-5 scale)`,
              '',
              statusLine,
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## RAG Eval CI';
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            backend/tests/fixtures/eval_latest_results.json
            backend/tests/fixtures/eval_baseline.json
          retention-days: 30

      - name: Fail on regression
        if: steps.eval.outcome == 'failure'
        run: |
          echo "::error::Eval pipeline failed — metric regression detected. See PR comment for details."
          exit 1
